<div class="container-fluid py-4 bg-light" style="min-height: 100vh">
  <div class="d-flex justify-content-between align-items-center mb-4 px-3">
    <h2 class="fw-bold text-dark">Task List</h2>
    <button class="btn btn-primary shadow-sm" routerLink="/add-task">
      <i class="bi bi-plus-lg me-1"></i> Add Task
    </button>
  </div>

  <div class="row g-3">
    @for (status of ['TO_DO', 'IN_PROGRESS', 'DONE']; track status) {
      <div class="col-md-4">
        <div
          class="kanban-col p-3 rounded-3 shadow-sm border-top border-4"
          [ngClass]="{
            'border-info': status === 'TO_DO',
            'border-warning': status === 'IN_PROGRESS',
            'border-success': status === 'DONE',
          }"
        >
          <h6 class="text-uppercase fw-bold text-muted mb-3">{{ status.replace('_', ' ') }}</h6>

          @for (task of tasks(); track task.id) {
            @if (task.status === status) {
              <div class="card mb-3 border-0 shadow-sm task-card">
                <div class="card-body">
                  <h6 class="fw-bold">{{ task.title }}</h6>
                  <p class="text-muted small mb-3">{{ task.description }}</p>
                  <div class="d-flex justify-content-end gap-2 pt-2 border-top">
                    <button
                      class="btn btn-sm btn-outline-primary border-0"
                      [routerLink]="['/edit-task', task.id]"
                    >
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button
                      class="btn btn-sm btn-outline-danger border-0"
                      (click)="deleteTask(task.id)"
                    >
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </div>
              </div>
            }
          }
        </div>
      </div>
    }
  </div>
</div>
