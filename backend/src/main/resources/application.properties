spring.application.name=taskmanager
# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager?useSSL=false&serverTimezone=UTC
spring.datasource.username=taskmanager
spring.datasource.password=taskmanager1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console
spring.jpa.show-sql=true

# Format SQL nicely
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect (for MySQL 8+, generic works)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
