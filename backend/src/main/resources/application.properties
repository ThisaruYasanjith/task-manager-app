spring.application.name=taskmanager

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager?useSSL=false&serverTimezone=UTC
spring.datasource.username=taskmanager
spring.datasource.password=taskmanager1234

# JPA / Hibernate settings
# 'update' is good for development; 'validate' is preferred for true production
spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true